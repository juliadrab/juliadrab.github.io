<!DOCTYPE html>
<html lang="pl">
  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Julia Drab - Twórczość </title>

    <link rel="icon" type="image/svg+xml" href="grafiki/logo.svg">
    
    <style> /* ostylowanie całej przestrzeni strony */
        body {
            background-color: #0b132b;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 40px 20px;        /* odstępy od krawędzi ekranu (góra/dół, boki) */
            margin: 0;
        }

        /* główny nagłówek (tytuł strony) */
        h1 {
            color: #4cc9f0;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Podtytuł strony */
        .sub {
            color: #8da9c4;
            font-style: italic;        /* kursywa */
            margin-bottom: 40px;
        }

        /* kontener, kafelki w jednej siatce */
        .grid-tworczosci {
            display: flex;             /* elastyczny układ elementów */
            flex-wrap: wrap;           /* jeśli kafelki nie mieszczą się w jednej linii, przejdą do następnej */
            justify-content: center;   /* środkowanie kafelków */
            gap: 20px;                 /* odstępy pomiędzy kafelkami */
            max-width: 1000px;         /* maksymalna szerokość całej sekcji na dużych ekranach */
            margin: 0 auto;            /* wyśrodkowanie całej siatki na komputerze */
        }

        /* wygląd pojedynczego kafelka */
        .kafelek {
            background-color: #1c2541;
            border: 1px solid #3a506b; /* ramka wokół kafelka */
            border-radius: 12px;       /* zaokrąglone rogi */
            padding: 25px;             /* przestrzeń wewnątrz kafelka, żeby tekst nie dotykał brzegów */
            width: 280px;              /* stała szerokość kafelka */
            transition: 0.3s ease;     /* płynne animowanie efektu najechania myszką */
        }

        /* efekt najechania myszką na kafelek */
        .kafelek:hover {
            transform: translateY(-5px); /* kafelek delikatnie unosi się do góry */
            border-color: #4cc9f0;       /* ramka zmienia kolor */
            box-shadow: 0 10px 20px rgba(76, 201, 240, 0.3); /* blask pod spodem */
        }

        /* tytuły wewnątrz kafelków */
        .kafelek h3 {
            color: #4cc9f0;
            margin-top: 0;
        }
      
        footer {
            text-align: center; /* Wyśrodkowanie tekstu */
            padding: 30px 10px; /* Odstęp wewnątrz stopki */
            margin-top: 50px; /* Odsunięcie stopki od głównej treści strony */
            font-size: 14px; /* Nieco mniejsza, dyskretna czcionka */
            color: #888888; /* Szary, stonowany kolor tekstu */
            border-top: 1px solid #333333; /* Opcjonalnie: delikatna linia oddzielająca stopkę od reszty strony */
        }

    </style>
  
</head>

  
<body>

    <h1> Przestrzeń Twórcza Julii Drab </h1>
    <p class="sub"> Archiwum fragmentów myśli i serca 💙 </p>

    <div class="grid-tworczosci">

        <a href="poezja.html" style="text-decoration: none; color: inherit;">
            <div class="kafelek">
                <h3>✒️ Poezja</h3>
                <p>Miejsce dla niewypowiedzianego</p>
            </div>
        </a>

        <a href="teksty.html" style="text-decoration: none; color: inherit;">
            <div class="kafelek">
                <h3>📄 Teksty</h3>
                <p>Refleksje bez filtra</p>
            </div>
        </a>

        <a href="fotografia.html" style="text-decoration: none; color: inherit;">
            <div class="kafelek">
                <h3>📷 Fotografia</h3>
                <p>Zatrzymane w kadrze</p>
            </div>
        </a>

        <a href="grafika.html" style="text-decoration: none; color: inherit;">
            <div class="kafelek">
                <h3>💻 Grafika</h3>
                <p>Linie, kształty i wyobraźnia</p>
            </div>
        </a>

    </div>

    <footer>
    <p>© <span id="rok"></span> Julia Drab. Wszelkie prawa zastrzeżone.</p>
    </footer>
    
    <script>
    document.getElementById("rok").textContent = new Date().getFullYear();
    </script>
    
</body>
  
</html>
