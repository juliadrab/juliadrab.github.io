        body {

        .wroc-btn {

            color: #4cc9f0;

        /* --- BLOK CAŁEJ WYSTAWY --- */
        .wystawa-link {
            text-decoration: none;
            color: inherit;
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .wystawa-tytul {
            font-size: 1.4rem;
            color: #ffffff;
            margin-bottom: 15px;
            text-align: center;
            width: 100%;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-left: 3px solid #4cc9f0;
            padding-left: 10px;
        }

        /* Kontener na pokaz slajdów - jedno duże zdjęcie */
        .slideshow-kontener {
            position: relative;
            width: 70%;
            height: 700px; 
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid #3a506b;
        }

        /* Styl dla pojedynczego slajdu */
        .slajd {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* zdjęcie wypełnia całą przestrzeń bez zniekształceń */
            opacity: 0;
            transition: opacity 1s ease-in-out; /* płynne przenikanie zdjęć, efekt fade */
        }

        /* Klasa aktywnego slajdu, który aktualnie widać */
        .slajd.aktywny {
            opacity: 1;
        }

        footer {
            text-align: center; /* Wyśrodkowanie tekstu */
            padding: 30px 10px; /* Odstęp wewnątrz stopki */
            margin-top: 50px; /* Odsunięcie stopki od głównej treści strony */
            font-size: 14px; /* Nieco mniejsza, dyskretna czcionka */
            color: #888888; /* Szary, stonowany kolor tekstu */
            border-top: 1px solid #333333; /* Opcjonalnie: delikatna linia oddzielająca stopkę od reszty strony */
        }

    </style>
</head>

    <script>
        document.querySelectorAll('.slideshow-kontener').forEach(kontener => {
            let slajdy = kontener.querySelectorAll('.slajd');
            let aktualnyIndex = 0;

            setInterval(() => {
                slajdy[aktualnyIndex].classList.remove('aktywny');
                aktualnyIndex = (aktualnyIndex + 1) % slajdy.length;
                slajdy[aktualnyIndex].classList.add('aktywny');
            }, 4000); // 4000 milisekund = 4 sekundy
        });
    </script>
