<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografia | Julia Drab</title>

    <link rel="icon" type="image/svg+xml" href="grafiki/logo.svg">
    
    <style>
        body {
            background-color: #0b132b; /* Twój głęboki granat */
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            padding: 30px 15px;
            margin: 0;
            text-align: center;
        }

        .wroc-btn {
            display: inline-block;
            color: #8da9c4;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        h1 {
            color: #4cc9f0;
            font-size: 2.2rem;
            margin-bottom: 40px;
        }

        /* --- BLOK CAŁEJ WYSTAWY --- */
        .wystawa-link {
            text-decoration: none;
            color: inherit;
            display: block;
            margin-bottom: 50px;
        }

        .wystawa-tytul {
            font-size: 1.4rem;
            color: #ffffff;
            margin-bottom: 15px;
            text-align: left;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-left: 3px solid #4cc9f0;
            padding-left: 10px;
        }

        /* Kontener na pokaz slajdów - jedno duże zdjęcie */
        .slideshow-kontener {
            position: relative;
            width: 100%;
            height: 400px; 
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid #3a506b;
        }

        /* Styl dla pojedynczego slajdu */
        .slajd {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* zdjęcie wypełnia całą przestrzeń bez zniekształceń */
            opacity: 0;
            transition: opacity 1s ease-in-out; /* płynne przenikanie zdjęć, efekt fade */
        }

        /* Klasa aktywnego slajdu, który aktualnie widać */
        .slajd.aktywny {
            opacity: 1;
        }

        footer {
            text-align: center; /* Wyśrodkowanie tekstu */
            padding: 30px 10px; /* Odstęp wewnątrz stopki */
            margin-top: 50px; /* Odsunięcie stopki od głównej treści strony */
            font-size: 14px; /* Nieco mniejsza, dyskretna czcionka */
            color: #888888; /* Szary, stonowany kolor tekstu */
            border-top: 1px solid #333333; /* Opcjonalnie: delikatna linia oddzielająca stopkę od reszty strony */
        }

    </style>
</head>
<body>

        <a href="index.html" class="wroc-btn">← Wróć do strony głównej</a>
    
    <h1>Galeria Fotografii</h1>
    
    <div style="text-align: center; margin-top: -25px; margin-bottom: 40px;">
        <p style="color: #8da9c4; font-size: 1.1rem; margin-bottom: 5px;">Więcej zdjęć znajdziesz tutaj:</p>
        <a href="https://instagram.com/drab.jpg" target="_blank" style="color: #4cc9f0; text-decoration: none; font-weight: bold; font-size: 1.2rem; transition: 0.3s;">
            📸 Instagram @drab.jpg
        </a>
    </div>


    <a href="wystawa1.html" class="wystawa-link">
        <div class="wystawa-tytul">Barwy morza</div>
        <div class="slideshow-kontener" data-wystawa="1">
            <img class="slajd aktywny" src="fotografie/m1.jpg" alt="Morze 1">
            <img class="slajd" src="fotografie/m2.jpg" alt="Morze 2">
            <img class="slajd" src="fotografie/m3.jpg" alt="Morze 3">
            <img class="slajd" src="fotografie/m4.jpg" alt="Morze 4">
            <img class="slajd" src="fotografie/m5.jpg" alt="Morze 5">
            <img class="slajd" src="fotografie/m6.jpg" alt="Morze 6">
        </div>
    </a>

    <a href="wystawa2.html" class="wystawa-link">
        <div class="wystawa-tytul">Melancholia natury</div>
        <div class="slideshow-kontener" data-wystawa="2">
            <img class="slajd aktywny" src="" alt="Foto 1">
            <img class="slajd" src="" alt="Foto 2">
            <img class="slajd" src="" alt="Foto 3">
        </div>
    </a>

    <a href="#" class="wystawa-link">
        <div class="wystawa-tytul">Zgiełk i cisza</div>
        <div class="slideshow-kontener" data-wystawa="3">
            <img class="slajd aktywny" src="" alt="Foto 1">
            <img class="slajd" src="" alt="Foto 2">
        </div>
    </a>

    <a href="#" class="wystawa-link">
        <div class="wystawa-tytul">Fragmenty emocji</div>
        <div class="slideshow-kontener" data-wystawa="4">" alt="Foto 1">
            <img class="slajd" src="" alt="Foto 2">
        </div>
    </a>

    <script>
        document.querySelectorAll('.slideshow-kontener').forEach(kontener => {
            let slajdy = kontener.querySelectorAll('.slajd');
            let aktualnyIndex = 0;

            setInterval(() => {
                slajdy[aktualnyIndex].classList.remove('aktywny');
                aktualnyIndex = (aktualnyIndex + 1) % slajdy.length;
                slajdy[aktualnyIndex].classList.add('aktywny');
            }, 4000); // 4000 milisekund = 4 sekundy
        });
    </script>


    <footer>
    <p>© <span id="rok"></span> Julia Drab. Wszelkie prawa zastrzeżone.</p>
    </footer>
    
    <script>
    document.getElementById("rok").textContent = new Date().getFullYear();
    </script>
    
</body>
</html>
